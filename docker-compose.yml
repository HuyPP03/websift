# websift MCP server — no required .env file.
# Inject secrets at runtime only (compose env / --env-file / orchestrator secrets).
# Do not bake API keys or MCP_BEARER_TOKEN into the image.

services:
  websift:
    build: .
    image: websift:local
    container_name: websift
    ports:
      - "${MCP_PORT:-8787}:8787"
    environment:
      # Container-local bind; publish via ports: mapping only.
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8787"
      MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable-http}
      MCP_AUTH_MODE: ${MCP_AUTH_MODE:-none}
      # Optional — leave empty when MCP_AUTH_MODE=none
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN:-}
      MCP_MAX_REQUEST_BODY_BYTES: ${MCP_MAX_REQUEST_BODY_BYTES:-}
      SEARCH_PROVIDER: ${SEARCH_PROVIDER:-ddgs}
      SEARCH_MAX_RESULTS: ${SEARCH_MAX_RESULTS:-5}
      SEARCH_FALLBACK_PROVIDERS: ${SEARCH_FALLBACK_PROVIDERS:-}
      SEARCH_TIMEOUT_SECONDS: ${SEARCH_TIMEOUT_SECONDS:-30}
      FETCH_TIMEOUT_SECONDS: ${FETCH_TIMEOUT_SECONDS:-30}
      # Internal browser service (start with: docker compose --profile browser up).
      BROWSER_ENDPOINT: ${BROWSER_ENDPOINT:-http://browser:8790}
      BROWSER_TOKEN: ${BROWSER_TOKEN:-websift-dev-token}
      BROWSER_ALLOW_INSECURE_ENDPOINT: ${BROWSER_ALLOW_INSECURE_ENDPOINT:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Provider endpoints/keys — empty by default; set via shell env or:
      #   docker compose --env-file .env up
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-}
      SEARXNG_API_KEY: ${SEARXNG_API_KEY:-}
      BRAVE_BASE_URL: ${BRAVE_BASE_URL:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TAVILY_BASE_URL: ${TAVILY_BASE_URL:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_BASE_URL: ${EXA_BASE_URL:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      PROVIDER_ALLOW_HTTP: ${PROVIDER_ALLOW_HTTP:-false}
    restart: unless-stopped
    # Optional resource hints (uncomment if your orchestrator supports them):
    # mem_limit: 512m
    # cpus: "1.0"

  browser:
    profiles: ["browser"]
    build: ./services/browser
    image: websift-browser:local
    environment:
      BROWSER_HOST: "0.0.0.0"
      BROWSER_PORT: "8790"
      BROWSER_TOKEN: ${BROWSER_TOKEN:-websift-dev-token}
      BROWSER_CONCURRENCY: ${BROWSER_CONCURRENCY:-2}
      BROWSER_ALLOWED_PORTS: ${BROWSER_ALLOWED_PORTS:-80,443}
      BROWSER_ALLOW_HTTP: ${BROWSER_ALLOW_HTTP:-true}
      BROWSER_ALLOWED_DOMAINS: ${BROWSER_ALLOWED_DOMAINS:-}
      BROWSER_DENIED_DOMAINS: ${BROWSER_DENIED_DOMAINS:-}
    expose:
      - "8790"
    ports:
      - "${BROWSER_PORT_HOST:-127.0.0.1:8790}:8790"
    init: true
    shm_size: "1gb"
    restart: unless-stopped
