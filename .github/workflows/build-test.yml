name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check websift tests

      - name: Ruff format check
        run: ruff format --check websift tests

      - name: Pytest (offline suite + coverage)
        run: |
          python -m pytest \
            --cov=websift \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -m "not live and not provider"

  package:
    name: Build package + smoke
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Twine check
        run: twine check dist/*

      - name: List artifacts
        run: ls -lh dist/

      - name: Install wheel in clean venv + smoke
        run: |
          python -m venv /tmp/websift-smoke
          /tmp/websift-smoke/bin/pip install --upgrade pip
          /tmp/websift-smoke/bin/pip install dist/websift-*.whl
          /tmp/websift-smoke/bin/python - <<'PY'
          import os
          import websift
          from importlib.metadata import entry_points, version
          from websift import WebSearchClient
          from websift.cli import main
          from websift.server import create_server
          from websift.settings import AppSettings, ServerSettings

          assert websift.__version__ == version("websift"), (
              websift.__version__,
              version("websift"),
          )
          client = WebSearchClient()
          assert client.max_results == 5
          assert client.search("") == "No query provided."
          assert client.fetch("") == "No URL provided."

          app = create_server(
              AppSettings(server=ServerSettings(host="127.0.0.1", transport="stdio")),
              warn_public_bind=False,
          )
          assert app.transport == "stdio"
          assert callable(app.web_search)
          assert callable(app.web_fetch)

          # Console entry points to CLI — do NOT execute bare main() (starts server).
          eps = entry_points()
          scripts = eps.select(group="console_scripts") if hasattr(eps, "select") else eps.get("console_scripts", [])
          websift_eps = [e for e in scripts if e.name == "websift"]
          assert websift_eps, "console_scripts entry 'websift' missing"
          assert websift_eps[0].value == "websift.cli:main"
          assert callable(main)
          assert os.path.isfile("/tmp/websift-smoke/bin/websift")
          assert os.access("/tmp/websift-smoke/bin/websift", os.X_OK)
          # --help / --version must not start the server.
          import subprocess
          h = subprocess.run(["/tmp/websift-smoke/bin/websift", "--help"], capture_output=True, text=True, check=True)
          assert "serve" in h.stdout
          v = subprocess.run(["/tmp/websift-smoke/bin/websift", "--version"], capture_output=True, text=True, check=True)
          assert websift.__version__ in v.stdout
          print("smoke ok", websift.__version__, "entry", websift_eps[0].value)
          PY

      - name: Smoke optional provider extras
        run: |
          set -euo pipefail
          WHL=$(ls dist/websift-*.whl | head -1)
          for extra in searxng brave tavily exa providers; do
            echo "::group::extra=${extra}"
            rm -rf "/tmp/websift-extra-${extra}"
            python -m venv "/tmp/websift-extra-${extra}"
            "/tmp/websift-extra-${extra}/bin/pip" install --upgrade pip
            "/tmp/websift-extra-${extra}/bin/pip" install "${WHL}[${extra}]"
            "/tmp/websift-extra-${extra}/bin/python" - <<'PY'
          from websift.providers.registry import list_providers, is_registered
          from websift.providers import brave, ddgs, exa, searxng, tavily

          names = set(list_providers())
          for n in ("ddgs", "searxng", "brave", "tavily", "exa"):
              assert n in names and is_registered(n), n
          assert brave.BraveProvider and tavily.TavilyProvider
          assert exa.ExaProvider and searxng.SearxngProvider and ddgs.DdgsProvider
          print("provider modules ok", sorted(names))
          PY
            echo "::endgroup::"
          done

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  docker:
    name: Docker build + smoke
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t websift:ci .

      - name: Run container
        run: |
          docker run -d --name websift-ci \
            -p 8787:8787 \
            -e MCP_HOST=0.0.0.0 \
            -e MCP_PORT=8787 \
            -e MCP_TRANSPORT=streamable-http \
            -e MCP_AUTH_MODE=none \
            websift:ci

      - name: Wait for TCP listen
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if python -c "import socket; s=socket.create_connection(('127.0.0.1',8787),1); s.close()"; then
              echo "port open"
              exit 0
            fi
            sleep 1
          done
          echo "timeout waiting for port 8787"
          docker logs websift-ci || true
          exit 1

      - name: Non-root user smoke
        run: |
          set -euo pipefail
          uid=$(docker exec websift-ci id -u)
          user=$(docker exec websift-ci whoami)
          test "$uid" = "10001"
          test "$user" = "websift"
          docker exec websift-ci python -c "import websift; print(websift.__version__)"
          docker exec websift-ci which websift

      - name: Image must not embed common secret env values
        run: |
          set -euo pipefail
          if docker history --no-trunc websift:ci | grep -Eiq 'MCP_BEARER_TOKEN=|BRAVE_API_KEY=|TAVILY_API_KEY=|EXA_API_KEY='; then
            echo "secret-like ENV assignment found in image history" >&2
            exit 1
          fi

      - name: Collect logs and stop
        if: always()
        run: |
          docker logs websift-ci || true
          docker rm -f websift-ci || true
